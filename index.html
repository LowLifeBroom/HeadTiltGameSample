<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Head Tilt Surfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050011; }
        canvas { display: block; }
        
        #webcam-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            height: 200px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            z-index: 10;
        }
        
        #webcam-container canvas {
            width: 100% !important;
            height: auto !important;
            object-fit: cover;
        }
        
        #label-container {
            width: 100%;
            background: rgba(0,0,0,0.7);
            font-size: 0.75rem;
            padding: 4px;
        }
        
        #label-container div {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding: 2px 4px;
        }
    </style>
</head>
<body>

    <!-- UI Overlay -->
    <div class="absolute top-0 left-0 w-full p-6 flex justify-between items-start pointer-events-none z-10">
        <div>
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-b from-pink-500 via-purple-500 to-cyan-400 tracking-widest uppercase drop-shadow-[0_0_10px_rgba(255,0,255,0.8)] italic">Tilt Surfer</h1>
            <p class="text-pink-200 text-sm mt-1 drop-shadow-md">Controls: Head Tilt (Left/Right) or Arrow Keys</p>
        </div>
        <div class="flex gap-8 text-right">
            <div>
                <p class="text-lg font-bold text-pink-400 drop-shadow-[0_0_5px_rgba(255,0,255,0.8)]">LIVES</p>
                <p id="livesDisplay" class="text-3xl font-black">❤️</p>
            </div>
            <div>
                <p class="text-lg font-bold text-cyan-400 drop-shadow-[0_0_5px_rgba(0,255,255,0.8)]">SCORE</p>
                <p id="scoreDisplay" class="text-4xl font-black text-white drop-shadow-[0_0_8px_rgba(0,255,255,1)]">0</p>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="absolute inset-0 bg-black bg-opacity-90 flex flex-col items-center justify-center hidden z-20">
        <h2 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-500 to-pink-600 mb-4 drop-shadow-[0_0_20px_rgba(255,0,100,0.8)] italic">CRASHED!</h2>
        <p class="text-2xl text-white mb-8">Final Score: <span id="finalScoreDisplay" class="text-cyan-400 font-bold drop-shadow-[0_0_10px_rgba(0,255,255,0.8)]">0</span></p>
        <button onclick="restartGame()" class="px-10 py-4 bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-black rounded-full text-2xl transition-transform hover:scale-105 active:scale-95 pointer-events-auto shadow-[0_0_20px_rgba(255,0,255,0.5)] border-2 border-pink-400">
            PLAY AGAIN
        </button>
    </div>

    <!-- Start Screen -->
    <div id="startScreen" class="absolute inset-0 bg-[#0a0514] bg-opacity-95 flex flex-col items-center justify-center z-30">
        <h1 class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-b from-pink-500 via-purple-500 to-cyan-400 mb-4 tracking-widest uppercase drop-shadow-[0_0_15px_rgba(255,0,255,0.6)] italic">Tilt Surfer</h1>
        <p class="text-xl text-cyan-200 mb-8 text-center max-w-md drop-shadow-md">The game will automatically start once your webcam is on and properly detecting your pose!</p>
        <button id="main-start-btn" onclick="initML()" class="px-10 py-4 bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-black rounded-full text-2xl transition-transform hover:scale-105 active:scale-95 pointer-events-auto shadow-[0_0_20px_rgba(0,255,255,0.5)] border-2 border-cyan-400">
            ENABLE WEBCAM
        </button>
        <p id="loadingText" class="text-pink-400 mt-4 hidden font-bold animate-pulse text-xl drop-shadow-[0_0_5px_rgba(255,0,255,0.8)]">Loading Model & Camera...</p>
    </div>

    <!-- Container for Teachable Machine Webcam -->
    <div id="webcam-container" class="hidden">
        <div id="ml-content" class="w-full h-full flex flex-col justify-between">
            <canvas id="canvas"></canvas>
            <div id="label-container"></div>
        </div>
    </div>

    <script>
        // --- GAME VARIABLES ---
        let scene, camera, renderer;
        let player;
        let obstacles = [];
        let score = 0;
        let lives = 1; 
        const MAX_LIVES = 3;
        let gameActive = false; 
        let gameStarted = false; 
        let speed = 0.5; 
        let lastSpawnTime = 0; 
        let mountains1, mountains2; 
        let dashedLines = []; 
        
        // Lane definitions (Left, Center, Right)
        const LANE_WIDTH = 3.5; 
        const LANES = [-LANE_WIDTH, 0, LANE_WIDTH];
        let currentLane = 1; 
        let targetX = 0;

        // High Contrast Synthwave Colors
        const COLOR_PLAYER = 0x00ffff; // Bright Neon Cyan (Solid)
        const COLOR_ROAD = 0x050508; // Very dark track
        const COLOR_EDGE = 0xffaa00; // Glowing Orange

        // --- ML VARIABLES ---
        const URL = "https://teachablemachine.withgoogle.com/models/ZEb-1Fz9Z/"; 
        let model, webcam, ctx, labelContainer, maxPredictions;
        let lastMoveTime = 0; 
        let centerHoldStartTime = 0; 
        let obstacleTex; 

        // Helper to generate thick borders and stripes for obstacles
        function createObstacleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const context = canvas.getContext('2d');

            // Dark background
            context.fillStyle = '#0a0005';
            context.fillRect(0, 0, 512, 512);

            // Diagonal Neon Red Stripes
            context.fillStyle = '#ff0033'; 
            context.beginPath();
            for(let i = -512; i < 1024; i += 128) {
                context.moveTo(i, 0);
                context.lineTo(i + 64, 0);
                context.lineTo(i - 512 + 64, 512);
                context.lineTo(i - 512, 512);
            }
            context.fill();

            // Thick Neon Orange/Red Border
            context.strokeStyle = '#ff4400';
            context.lineWidth = 40; 
            context.strokeRect(20, 20, 472, 472);

            return new THREE.CanvasTexture(canvas);
        }

        init();

        function init() {
            obstacleTex = createObstacleTexture();

            // 1. Setup Scene, Camera, Renderer
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a0b2e); 
            scene.fog = new THREE.Fog(0x1a0b2e, 40, 200); 

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 400); 
            camera.position.set(0, 6, 12); 
            camera.lookAt(0, -1, -20); 

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. Lighting 
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
            scene.add(ambientLight);

            // 3. The Neon Sun
            const sunGeo = new THREE.CircleGeometry(60, 64);
            const sunMat = new THREE.MeshBasicMaterial({ color: 0xff3300, fog: false }); 
            const sun = new THREE.Mesh(sunGeo, sunMat);
            sun.position.set(0, 30, -250);
            scene.add(sun);

            // 4. Procedural Scrolling Wireframe Mountains
            function createMountainMesh() {
                const mtnGeo = new THREE.PlaneGeometry(400, 400, 60, 60);
                mtnGeo.rotateX(-Math.PI / 2);
                const vertices = mtnGeo.attributes.position.array;
                for (let i = 0; i < vertices.length; i += 3) {
                    let x = vertices[i];
                    let z = vertices[i+2];
                    if (Math.abs(x) > 12) { 
                        let rise = Math.pow(Math.abs(x) - 10, 1.1) * 0.7;
                        let zPhase = (z / 400) * Math.PI * 2 * 15; 
                        let noise = Math.sin(x * 0.5) * Math.cos(zPhase) * rise * 0.4;
                        vertices[i+1] = rise + noise; 
                    }
                }
                const mtnMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true, transparent: true, opacity: 0.15 });
                return new THREE.Mesh(mtnGeo, mtnMat);
            }

            mountains1 = createMountainMesh();
            mountains1.position.z = 0;
            scene.add(mountains1);

            mountains2 = createMountainMesh();
            mountains2.position.z = -400;
            scene.add(mountains2);

            // 5. The Track / Road
            const roadGeo = new THREE.PlaneGeometry(12, 600);
            const roadMat = new THREE.MeshStandardMaterial({ color: COLOR_ROAD, roughness: 0.1 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            road.position.set(0, 0, -200);
            scene.add(road);

            // Glowing Road Edges 
            const edgeGeo = new THREE.PlaneGeometry(0.4, 600);
            const edgeMat = new THREE.MeshBasicMaterial({ color: COLOR_EDGE }); 
            const leftEdge = new THREE.Mesh(edgeGeo, edgeMat);
            leftEdge.rotation.x = -Math.PI / 2;
            leftEdge.position.set(-6, 0.02, -200);
            scene.add(leftEdge);

            const rightEdge = new THREE.Mesh(edgeGeo, edgeMat);
            rightEdge.rotation.x = -Math.PI / 2;
            rightEdge.position.set(6, 0.02, -200);
            scene.add(rightEdge);

            // Moving Dashed Center Lines 
            const dashGeo = new THREE.PlaneGeometry(0.15, 3);
            const dashMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            for (let i = 0; i < 25; i++) {
                let line1 = new THREE.Mesh(dashGeo, dashMat);
                line1.rotation.x = -Math.PI / 2;
                line1.position.set(-1.75, 0.02, -i * 10);
                scene.add(line1);
                dashedLines.push(line1);

                let line2 = new THREE.Mesh(dashGeo, dashMat);
                line2.rotation.x = -Math.PI / 2;
                line2.position.set(1.75, 0.02, -i * 10);
                scene.add(line2);
                dashedLines.push(line2);
            }

            // 6. Player (Solid Bright Neon Cyan)
            const playerGeometry = new THREE.BoxGeometry(1.4, 1.4, 1.4);
            const playerMaterial = new THREE.MeshBasicMaterial({ color: COLOR_PLAYER }); 
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.position.set(LANES[currentLane], 0.75, 0);
            scene.add(player);

            // 7. Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('keydown', handleKeyDown, false);

            window.onload = () => {
                animate();
            };
        }

        // --- CONTROLS ---

        function handleKeyDown(event) {
            if (!gameActive) return;
            if (event.key === 'ArrowLeft') movePlayer('left');
            if (event.key === 'ArrowRight') movePlayer('right');
        }

        function movePlayer(direction) {
            if (direction === 'left' && currentLane > 0) {
                currentLane--;
            } else if (direction === 'right' && currentLane < 2) {
                currentLane++;
            }
            targetX = LANES[currentLane];
            centerHoldStartTime = 0; 
        }

        // --- MACHINE LEARNING HOOK ---
        function handleMLPrediction(className) {
            if (!gameActive) return;

            const now = Date.now();
            const cName = className.toLowerCase();

            if (cName.includes("left")) {
                centerHoldStartTime = 0; 
                if (currentLane !== 0 && now - lastMoveTime > 200) {
                    currentLane = 0;
                    targetX = LANES[currentLane];
                    lastMoveTime = now;
                }
            } else if (cName.includes("right")) {
                centerHoldStartTime = 0; 
                if (currentLane !== 2 && now - lastMoveTime > 200) {
                    currentLane = 2;
                    targetX = LANES[currentLane];
                    lastMoveTime = now;
                }
            } else if (cName.includes("center") || cName.includes("neutral") || cName.includes("straight") || cName.includes("none") || cName.includes("no tilt")) {
                if (currentLane !== 1) {
                    if (centerHoldStartTime === 0) {
                        centerHoldStartTime = now;
                    } else if (now - centerHoldStartTime > 150) { 
                        currentLane = 1;
                        targetX = LANES[currentLane];
                        lastMoveTime = now;
                        centerHoldStartTime = 0; 
                    }
                } else {
                    centerHoldStartTime = 0;
                }
            }
        }

        // --- TEACHABLE MACHINE LOGIC ---
        
        async function initML() {
            document.getElementById('main-start-btn').classList.add('hidden');
            document.getElementById('loadingText').classList.remove('hidden');

            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            try {
                model = await tmPose.load(modelURL, metadataURL);
                maxPredictions = model.getTotalClasses();

                const size = 200;
                const flip = true; 
                webcam = new tmPose.Webcam(size, size, flip); 
                await webcam.setup(); 
                await webcam.play();
                window.requestAnimationFrame(loop);

                const canvas = document.getElementById("canvas");
                canvas.width = size; canvas.height = size;
                ctx = canvas.getContext("2d");
                labelContainer = document.getElementById("label-container");
                
                labelContainer.innerHTML = '';
                
                for (let i = 0; i < maxPredictions; i++) { 
                    labelContainer.appendChild(document.createElement("div"));
                }
            } catch (error) {
                console.error("Error loading model:", error);
                document.getElementById('main-start-btn').classList.remove('hidden');
                document.getElementById('loadingText').classList.add('hidden');
                alert("Failed to load model. Check browser console for details.");
            }
        }

        async function loop(timestamp) {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            if (!webcam.canvas) return;
            
            const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
            const prediction = await model.predict(posenetOutput);

            let highestProb = 0;
            let bestClass = "";

            for (let i = 0; i < maxPredictions; i++) {
                const classPrediction = prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
                if(labelContainer.childNodes[i]) {
                    labelContainer.childNodes[i].innerHTML = classPrediction;
                }
                
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestClass = prediction[i].className;
                }
            }

            if (!gameStarted && highestProb > 0.8) {
                gameStarted = true;
                gameActive = true;
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('webcam-container').classList.remove('hidden');
                lastSpawnTime = Date.now(); 
            }

            if (highestProb > 0.85) {
                handleMLPrediction(bestClass);
            }

            drawPose(pose);
        }

        function drawPose(pose) {
            if (webcam.canvas && ctx) {
                ctx.drawImage(webcam.canvas, 0, 0);
                if (pose) {
                    const minPartConfidence = 0.5;
                    tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                    tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
                }
            }
        }

        // --- GAME LOGIC ---

        function updateLivesUI() {
            let heartsText = "";
            for (let i = 0; i < lives; i++) heartsText += "❤️";
            document.getElementById('livesDisplay').innerText = heartsText || "💀";
        }

        function createHeartMesh() {
            const heartGroup = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0xaa0000, roughness: 0.2 }); 
            const geo = new THREE.BoxGeometry(0.3, 0.3, 0.3);
            
            const voxels = [
                [-1, 2], [1, 2],
                [-2, 1], [-1, 1], [0, 1], [1, 1], [2, 1],
                [-2, 0], [-1, 0], [0, 0], [1, 0], [2, 0],
                [-1, -1], [0, -1], [1, -1],
                [0, -2]
            ];
            
            voxels.forEach(v => {
                const cube = new THREE.Mesh(geo, mat);
                cube.position.set(v[0] * 0.3, v[1] * 0.3 + 1.5, 0); 
                heartGroup.add(cube);
            });
            return heartGroup;
        }

        function spawnObstacle() {
            const laneIndex = Math.floor(Math.random() * 3);
            let entity;

            // Count how many hearts are currently on the track
            let heartsOnTrack = obstacles.filter(obs => obs.userData && obs.userData.type === 'heart').length;

            // Strict limit: Player Lives + Hearts on Track must be less than MAX_LIVES
            if ((lives + heartsOnTrack) < MAX_LIVES && Math.random() < 0.1) {
                entity = createHeartMesh();
                entity.userData = { type: 'heart', rotationSpeed: 0.05 };
                entity.position.set(LANES[laneIndex], 0, -180); 
            } else {
                // Obstacle: Dark body, thick Red/Orange Neon Striped Texture
                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshStandardMaterial({ 
                    map: obstacleTex,
                    emissiveMap: obstacleTex,
                    emissive: 0xffffff,
                    emissiveIntensity: 1.0,
                    roughness: 0.2
                }); 
                entity = new THREE.Mesh(geometry, material);

                // Lowered back to 1.0 so the 2x2x2 block rests perfectly flush with the ground (0 hover height)
                entity.position.set(LANES[laneIndex], 1.0, -180); 
                entity.userData = { type: 'obstacle' };
            }
            
            scene.add(entity);
            obstacles.push(entity);
        }

        function updateObstacles() {
            const now = Date.now();
            
            if (now - lastSpawnTime > 800 && Math.random() < 0.05 + (score * 0.0002)) { 
                spawnObstacle();
                lastSpawnTime = now;
            }

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.position.z += speed;

                const dz = Math.abs(player.position.z - obs.position.z);
                const dx = Math.abs(player.position.x - obs.position.x);

                if (dz < 1.5 && dx < 1.5) {
                    if (obs.userData && obs.userData.type === 'heart') {
                        lives++;
                        updateLivesUI();
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        continue; 
                    } else {
                        lives--;
                        updateLivesUI();
                        scene.remove(obs);
                        obstacles.splice(i, 1);
                        
                        player.material.color.setHex(0xffffff);
                        setTimeout(() => player.material.color.setHex(COLOR_PLAYER), 150);

                        if (lives <= 0) {
                            gameOver();
                        }
                        continue;
                    }
                }

                if (obs.position.z > 5) {
                    scene.remove(obs);
                    obstacles.splice(i, 1);
                    
                    if (obs.userData && obs.userData.type === 'obstacle') {
                        score += 10;
                        document.getElementById('scoreDisplay').innerText = score;
                        speed += 0.005; 
                    }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameActive) {
                player.position.x += (targetX - player.position.x) * 0.22;
                player.position.y = 0.75 + Math.abs(Math.sin(Date.now() * 0.01)) * 0.2;

                updateObstacles();

                // Animate Dashed Lines
                dashedLines.forEach(line => {
                    line.position.z += speed;
                    if (line.position.z > 10) line.position.z -= 250;
                });

                // Animate Scrolling Mountains
                mountains1.position.z += speed;
                mountains2.position.z += speed;
                if (mountains1.position.z >= 400) mountains1.position.z -= 800;
                if (mountains2.position.z >= 400) mountains2.position.z -= 800;

                obstacles.forEach(obs => {
                    if (obs.userData && obs.userData.type === 'heart') {
                        obs.rotation.y += obs.userData.rotationSpeed;
                    }
                });
            }

            renderer.render(scene, camera);
        }

        function gameOver() {
            gameActive = false;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('finalScoreDisplay').innerText = score;
        }

        function restartGame() {
            obstacles.forEach(obs => scene.remove(obs));
            obstacles = [];
            
            score = 0;
            lives = 1; 
            speed = 0.5;
            lastSpawnTime = Date.now(); 
            currentLane = 1;
            targetX = LANES[currentLane];
            player.position.x = targetX;
            player.material.color.setHex(COLOR_PLAYER);
            
            document.getElementById('scoreDisplay').innerText = score;
            updateLivesUI();
            
            document.getElementById('gameOverScreen').classList.add('hidden');
            gameActive = true;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
